name: Registry Validation

# NOTE: This workflow is NON-BLOCKING for the first 2 weeks after introduction.
# After the validation period (2026-05-02), promote to blocking by changing
# `continue-on-error: true` to `continue-on-error: false` on the two marked steps.

on:
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - '**.proto'
      - 'web-app/src/**'
      - 'docs/registry/**'

jobs:
  registry-validation:
    name: Registry Validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate protos and build web UI
        uses: ./.github/actions/prepare

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
        continue-on-error: true

      - name: Install frontend scanner dependencies
        run: cd tools/scanner/frontend && npm install --silent

      # registry-generate now writes per-feature files under docs/registry/features/
      # and calls registry-aggregate to rebuild the gitignored monolithic JSONs locally.
      - name: Run registry generation
        run: make registry-generate
        # NOTE: Non-blocking during validation period (see above)
        continue-on-error: true

      # Compares committed per-feature files vs what the scanner would produce.
      # Exits 1 if divergence > 2%, 0 otherwise.
      - name: Validate registry divergence
        id: validate
        run: |
          set +e
          OUTPUT=$(./tools/scanner/validate-registry.sh 2>&1)
          EXIT_CODE=$?
          echo "output<<EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "$OUTPUT"
          exit $EXIT_CODE
        # NOTE: Non-blocking during validation period (see above)
        continue-on-error: true

      # Reports features with no testIds — advisory, never blocks.
      - name: Report coverage gaps (untested features)
        id: coverage
        run: |
          python3 - <<'PYEOF'
          import json, glob, sys

          untested = []
          for path in sorted(glob.glob('docs/registry/features/backend/**/*.json', recursive=True)):
              d = json.load(open(path))
              if not d.get('testIds'):
                  untested.append(d['id'])

          total = len(list(glob.glob('docs/registry/features/backend/**/*.json', recursive=True)))
          covered = total - len(untested)
          pct = round(covered / total * 100, 1) if total else 0

          print(f"Coverage: {covered}/{total} features have testIds ({pct}%)")
          if untested:
              print(f"\nUntested features ({len(untested)}):")
              for fid in untested:
                  print(f"  - {fid}")

          with open('/tmp/coverage_summary.txt', 'w') as f:
              f.write(f"covered={covered}\ntotal={total}\npct={pct}\nuntested_count={len(untested)}\n")
          PYEOF

          COVERED=$(grep covered= /tmp/coverage_summary.txt | cut -d= -f2)
          TOTAL=$(grep total= /tmp/coverage_summary.txt | cut -d= -f2)
          PCT=$(grep pct= /tmp/coverage_summary.txt | cut -d= -f2)
          echo "covered=$COVERED" >> $GITHUB_OUTPUT
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "pct=$PCT" >> $GITHUB_OUTPUT

      - name: Post PR comment on registry status
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          VALIDATE_OUTPUT: ${{ steps.validate.outputs.output }}
          VALIDATE_EXIT_CODE: ${{ steps.validate.outputs.exit_code }}
          COVERAGE_COVERED: ${{ steps.coverage.outputs.covered }}
          COVERAGE_TOTAL: ${{ steps.coverage.outputs.total }}
          COVERAGE_PCT: ${{ steps.coverage.outputs.pct }}
        with:
          script: |
            const output = process.env.VALIDATE_OUTPUT || '';
            const exitCode = process.env.VALIDATE_EXIT_CODE || '0';
            const covered = process.env.COVERAGE_COVERED || '?';
            const total = process.env.COVERAGE_TOTAL || '?';
            const pct = process.env.COVERAGE_PCT || '?';

            // Only post if there were actual changes detected or divergence
            const hasDivergence = output.includes('Added') || output.includes('Removed') || exitCode !== '0';
            const hasLowCoverage = parseFloat(pct) < 50;
            if (!hasDivergence && !hasLowCoverage) {
              return;
            }

            const statusEmoji = exitCode === '0' ? '✅' : '⚠️';
            const body = `## ${statusEmoji} Registry Validation

\`\`\`
${output.substring(0, 3000)}
\`\`\`

**Test Coverage**: ${covered}/${total} features have \`testIds\` (${pct}%)

> Registry validation is in observation mode until 2026-05-02.
> After that date, divergence > 2% will block merges.
> Coverage reporting is advisory only.
`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
