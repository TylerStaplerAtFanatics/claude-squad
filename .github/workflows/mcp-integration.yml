name: MCP Integration Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'server/mcp/**'
      - 'server/services/mcp_injector.go'
      - 'server/services/hook_injector.go'
      - 'server/services/hook_receivers.go'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/mcp-integration.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'server/mcp/**'
      - 'server/services/mcp_injector.go'
      - 'server/services/hook_injector.go'
      - 'server/services/hook_receivers.go'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/mcp-integration.yml'

jobs:
  mcp-integration:
    name: MCP Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Generate protos and build web UI
        uses: ./.github/actions/prepare

      # The integration test (TestMCPHandshakeSubprocess) spawns a real
      # --mcp subprocess and exercises the full MCP stdio handshake.
      # It calls `go build` internally, so the Go toolchain must be present.
      - name: Run MCP integration tests
        run: |
          go test -tags=integration -timeout=120s -v -race \
            ./server/mcp/... \
            ./server/services/...
