name: E2E Feature Video Capture

# Story 6: Feature Flow Video Capture
# Runs on PRs that touch feature-marked files and records Playwright videos.
# Videos are uploaded as GitHub Actions artifacts (30-day retention).

on:
  pull_request:
    branches: [main]

jobs:
  detect-feature-changes:
    name: Detect Feature Changes
    runs-on: ubuntu-latest
    outputs:
      record_features: ${{ steps.detect.outputs.record_features }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect feature-marked file changes
        id: detect
        run: |
          set +e
          ./tools/ci/detect-feature-changes.sh origin/main
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "record_features=true" >> $GITHUB_OUTPUT
            echo "Feature changes detected — video recording will be enabled"
          else
            echo "record_features=false" >> $GITHUB_OUTPUT
            echo "No feature changes — skipping video recording"
          fi

  e2e-video:
    name: Record E2E Feature Videos
    runs-on: ubuntu-22.04  # Pinned to avoid VP8/VP9 codec surprises
    needs: detect-feature-changes
    if: needs.detect-feature-changes.outputs.record_features == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate protos and build web UI
        uses: ./.github/actions/prepare

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files
        continue-on-error: true

      - name: Build binary
        run: go build -o stapler-squad .

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm install
          npx playwright install chromium --with-deps

      - name: Run E2E tests with video recording
        env:
          RECORD_FEATURES: 'true'
          STAPLER_SQUAD_INSTANCE: test-${{ github.run_id }}
          TEST_SERVER_URL: http://localhost:8543
        run: |
          # Start test server in background
          STAPLER_SQUAD_USE_CONTROL_MODE=false STAPLER_SQUAD_INSTANCE=test-${{ github.run_id }} \
            ./stapler-squad --tmux-keep-server &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8543/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Run tests
          cd tests/e2e
          npx playwright test --reporter=list || true

          kill $SERVER_PID 2>/dev/null || true

      - name: Validate video files were created
        id: validate-videos
        run: |
          VIDEO_COUNT=$(find tests/e2e/test-results -name "*.webm" 2>/dev/null | wc -l || echo 0)
          echo "video_count=${VIDEO_COUNT}" >> $GITHUB_OUTPUT
          if [ "${VIDEO_COUNT}" -eq 0 ]; then
            echo "Warning: No .webm video files found after recording"
          else
            echo "Found ${VIDEO_COUNT} video file(s)"
          fi

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Convert videos to GIFs for docs/demos
        id: convert-gifs
        if: steps.validate-videos.outputs.video_count != '0'
        run: |
          mkdir -p docs/demos
          NAMES=""
          for webm in $(find tests/e2e/test-results -name "*.webm" 2>/dev/null \
            | grep -iv "terminal-flickering\|stress-test\|terminal-stress" \
            | head -5); do
            dir=$(basename "$(dirname "$webm")")
            name=$(echo "$dir" | sed 's/-chromium$//;s/-firefox$//;s/-webkit$//')
            gif="docs/demos/${name}.gif"
            # Skip near-empty recordings (< 1s) - palette generation fails on single-frame clips
            duration=$(ffprobe -v quiet -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 "$webm" 2>/dev/null)
            if [ -z "$duration" ] || awk "BEGIN{exit !(${duration:-0} < 1.0)}"; then
              echo "Skipping $webm (too short: ${duration:-unknown}s)"
              continue
            fi
            palette=$(mktemp --suffix=.png)
            echo "Converting $webm -> $gif"
            if ffmpeg -y -i "$webm" -vf "fps=8,scale=960:-2,palettegen=max_colors=128" -t 30 "$palette" 2>&1 \
               && ffmpeg -y -i "$webm" -i "$palette" \
                 -lavfi "fps=8,scale=960:-2[x];[x][1:v]paletteuse=dither=bayer:bayer_scale=3" \
                 -loop 0 -t 30 "$gif" 2>&1; then
              NAMES="${NAMES}${name},"
              echo "Created $gif ($(du -h "$gif" | cut -f1))"
            else
              echo "Warning: ffmpeg conversion failed for $webm"
            fi
            rm -f "$palette"
          done
          echo "names=${NAMES%,}" >> $GITHUB_OUTPUT
          if [ -z "$NAMES" ]; then
            echo "::error::No GIFs were produced — all video conversions failed or were skipped"
            exit 1
          fi

      - name: Commit GIFs to docs/demos on PR branch
        if: steps.convert-gifs.outputs.names != ''
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Save GIFs before switching branches — the PR workflow checks out a
          # detached merge commit, not the PR branch tip. Rebasing that merge
          # commit causes add/add conflicts with every file the PR touches.
          cp -r docs/demos /tmp/e2e-demos
          # Switch to the actual PR branch head for a clean push
          git fetch origin ${{ github.head_ref }}
          git checkout -B ${{ github.head_ref }} origin/${{ github.head_ref }}
          # Restore GIFs onto the branch
          mkdir -p docs/demos
          cp /tmp/e2e-demos/*.gif docs/demos/
          git add docs/demos/
          git diff --cached --quiet && echo "No GIF changes to commit" && exit 0
          git commit -m "chore(demos): update E2E feature GIFs [skip ci]"
          git push origin ${{ github.head_ref }}

      - name: Upload E2E videos as artifacts
        id: upload-videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-videos-${{ github.event.number }}-${{ github.sha }}
          path: tests/e2e/test-results/
          retention-days: 30
        continue-on-error: true

      - name: Post PR comment with embedded GIFs
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- e2e-videos -->';
            const videoCount = '${{ steps.validate-videos.outputs.video_count }}';
            const artifactUrl = '${{ steps.upload-videos.outputs.artifact-url }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const downloadLink = artifactUrl || runUrl;
            const branch = '${{ github.head_ref }}';
            const gifNames = '${{ steps.convert-gifs.outputs.names }}'.split(',').filter(Boolean);

            let lines;
            if (videoCount === '0') {
              lines = [
                '## ⚠️ E2E Video Recording',
                '',
                'Video recording was triggered but no .webm files were produced.',
                'This may indicate a VP8/VP9 codec issue on the runner.',
                '',
                `[View workflow run](${runUrl})`,
              ];
            } else {
              const gifSection = gifNames.flatMap(name => [
                `### ${name}`,
                `![${name}](https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/docs/demos/${name}.gif)`,
                '',
              ]);
              lines = [
                '## 🎬 E2E Feature Demos',
                '',
                `**${videoCount} feature flow(s)** recorded for this PR.`,
                '',
                ...gifSection,
                `[Download original recordings](${downloadLink}) (30-day retention)`,
              ];
            }

            const body = [marker, ...lines].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
