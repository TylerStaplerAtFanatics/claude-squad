name: E2E Feature Video Capture

# Story 6: Feature Flow Video Capture
# Runs on PRs that touch feature-marked files and records Playwright videos.
# Videos/GIFs are uploaded as unzipped artifacts (upload-artifact@v7, archive:false)
# so reviewers can view them directly in the browser without downloading a ZIP.

on:
  pull_request:
    branches: [main]

jobs:
  detect-feature-changes:
    name: Detect Feature Changes
    runs-on: ubuntu-latest
    outputs:
      record_features: ${{ steps.detect.outputs.record_features }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect feature-marked file changes
        id: detect
        run: |
          set +e
          ./tools/ci/detect-feature-changes.sh origin/main
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "record_features=true" >> $GITHUB_OUTPUT
            echo "Feature changes detected — video recording will be enabled"
          else
            echo "record_features=false" >> $GITHUB_OUTPUT
            echo "No feature changes — skipping video recording"
          fi

  e2e-video:
    name: Record E2E Feature Videos
    runs-on: ubuntu-22.04  # Pinned to avoid VP8/VP9 codec surprises
    needs: detect-feature-changes
    if: needs.detect-feature-changes.outputs.record_features == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate protos and build web UI
        uses: ./.github/actions/prepare

      - name: Download generated files
        uses: actions/download-artifact@v8
        with:
          name: generated-files
        continue-on-error: true

      - name: Build binary
        run: go build -o stapler-squad .

      - name: Install Playwright dependencies
        run: |
          cd tests/e2e
          npm install
          npx playwright install chromium --with-deps

      - name: Run E2E tests with video recording
        env:
          RECORD_FEATURES: 'true'
          TEST_SERVER_URL: http://localhost:8543
        run: |
          # Seed 6 mock demo sessions into a temp directory so the server
          # starts with pre-populated data (payment, auth, k8s, etc.)
          DEMO_DIR=$(mktemp -d)
          go run ./tests/demo/seed "$DEMO_DIR" 6
          echo "Seeded demo data into $DEMO_DIR"

          # Start server pointing at the seeded data directory
          STAPLER_SQUAD_USE_CONTROL_MODE=false \
            ./stapler-squad --tmux-keep-server --test-mode --test-dir "$DEMO_DIR" &
          SERVER_PID=$!

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8543/ > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          # Run tests
          cd tests/e2e
          npx playwright test --reporter=list || true

          kill $SERVER_PID 2>/dev/null || true
          rm -rf "$DEMO_DIR"

      - name: Validate video files were created
        id: validate-videos
        run: |
          VIDEO_COUNT=$(find tests/e2e/test-results -name "*.webm" 2>/dev/null | wc -l || echo 0)
          echo "video_count=${VIDEO_COUNT}" >> $GITHUB_OUTPUT
          if [ "${VIDEO_COUNT}" -eq 0 ]; then
            echo "Warning: No .webm video files found after recording"
          else
            echo "Found ${VIDEO_COUNT} video file(s)"
          fi

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Convert videos to GIFs
        id: convert-gifs
        if: steps.validate-videos.outputs.video_count != '0'
        run: |
          mkdir -p /tmp/demo-gifs
          NAMES=""
          # Prefer the demo flow first, then other feature tests in priority order.
          # One video per test dir (video.webm only, skip retry dirs and video-N.webm).
          # Exclude terminal stress tests — they're not feature demos.
          WEBMS=$(
            # 1. demo first
            find tests/e2e/test-results/demo-Demo-Flow-chromium \
              -maxdepth 1 -name "video.webm" 2>/dev/null | head -1
            # 2. other feature flows (session, review-queue, history, workspace, smoke)
            find tests/e2e/test-results -maxdepth 2 -name "video.webm" 2>/dev/null \
              | grep -iv "terminal-flickering\|terminal-stress\|stress-test\|-retry[0-9]" \
              | grep -v "demo-Demo-Flow" \
              | head -4
          )
          for webm in $WEBMS; do
            dir=$(basename "$(dirname "$webm")")
            name=$(echo "$dir" | sed 's/-chromium$//;s/-firefox$//;s/-webkit$//')
            gif="/tmp/demo-gifs/${name}.gif"
            # Skip near-empty recordings (< 1s) - palette generation fails on single-frame clips
            duration=$(ffprobe -v quiet -show_entries format=duration \
              -of default=noprint_wrappers=1:nokey=1 "$webm" 2>/dev/null)
            if [ -z "$duration" ] || awk "BEGIN{exit !(${duration:-0} < 1.0)}"; then
              echo "Skipping $webm (too short: ${duration:-unknown}s)"
              continue
            fi
            palette=$(mktemp --suffix=.png)
            echo "Converting $webm -> $gif"
            if ffmpeg -y -i "$webm" -vf "fps=8,scale=960:-2,palettegen=max_colors=128" -t 30 "$palette" 2>&1 \
               && ffmpeg -y -i "$webm" -i "$palette" \
                 -lavfi "fps=8,scale=960:-2[x];[x][1:v]paletteuse=dither=bayer:bayer_scale=3" \
                 -loop 0 -t 30 "$gif" 2>&1; then
              NAMES="${NAMES}${name},"
              echo "Created $gif ($(du -h "$gif" | cut -f1))"
            else
              echo "Warning: ffmpeg conversion failed for $webm"
            fi
            rm -f "$palette"
          done
          echo "names=${NAMES%,}" >> $GITHUB_OUTPUT
          if [ -z "$NAMES" ]; then
            echo "::warning::No GIFs were produced — WebM artifacts are still available for review"
          fi

      - name: Upload GIFs as artifact
        id: upload-gifs
        if: steps.convert-gifs.outputs.names != ''
        uses: actions/upload-artifact@v7
        with:
          name: e2e-gifs-${{ github.event.number }}-${{ github.sha }}
          path: /tmp/demo-gifs/
          retention-days: 30
          archive: false
        continue-on-error: true

      - name: Upload E2E videos as artifacts
        id: upload-videos
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-videos-${{ github.event.number }}-${{ github.sha }}
          path: tests/e2e/test-results/
          retention-days: 30
          archive: false
        continue-on-error: true

      - name: Post PR comment with artifact links
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- e2e-videos -->';
            const videoCount = '${{ steps.validate-videos.outputs.video_count }}';
            const gifUrl = '${{ steps.upload-gifs.outputs.artifact-url }}';
            const videoUrl = '${{ steps.upload-videos.outputs.artifact-url }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const gifNames = '${{ steps.convert-gifs.outputs.names }}'.split(',').filter(Boolean);

            let lines;
            if (videoCount === '0') {
              lines = [
                '## ⚠️ E2E Video Recording',
                '',
                'Video recording was triggered but no .webm files were produced.',
                'This may indicate a VP8/VP9 codec issue on the runner.',
                '',
                `[View workflow run](${runUrl})`,
              ];
            } else {
              const gifList = gifNames.map(name => `- \`${name}\``).join('\n');
              lines = [
                '## 🎬 E2E Feature Demos',
                '',
                `**${videoCount} feature flow(s)** recorded for this PR.`,
                '',
                gifNames.length > 0 ? `**Flows:**\n${gifList}` : '',
                '',
                gifUrl ? `**[View GIFs](${gifUrl})** (opens in browser, no download needed)` : '',
                videoUrl ? `[View recordings](${videoUrl})` : `[View workflow run](${runUrl})`,
                '',
                '_Artifacts expire after 30 days._',
              ].filter(l => l !== '');
            }

            const body = [marker, ...lines].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
