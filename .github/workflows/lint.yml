name: Lint

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'proto/**'
      - 'web-app/**.css'
      - 'web-app/**.ts'
      - 'web-app/**.tsx'
      - '.github/workflows/lint.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'proto/**'
      - 'web-app/**.css'
      - 'web-app/**.ts'
      - 'web-app/**.tsx'
      - '.github/workflows/lint.yml'

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web-app/package-lock.json

      - name: Install buf
        run: |
          curl -sSL "https://github.com/bufbuild/buf/releases/download/v1.41.0/buf-Linux-x86_64" \
            -o /usr/local/bin/buf && chmod +x /usr/local/bin/buf

      - name: Install web-app dependencies
        working-directory: web-app
        run: npm ci

      - name: Generate protobuf code
        run: buf generate proto

      - name: Create web dist stub
        run: |
          mkdir -p server/web/dist
          printf '<!DOCTYPE html><html><body></body></html>' > server/web/dist/index.html

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --timeout=3m --max-issues-per-linter=0 --max-same-issues=0
          skip-cache: false
          only-new-issues: false

      - name: ESLint (no-100vh, mobile regression rules)
        working-directory: web-app
        run: npx next lint --max-warnings 0

      - name: CSS lint (stylelint + undefined variable check)
        working-directory: web-app
        run: npm run lint:css

      - name: Check formatting (PR-changed files only)
        run: |
          # Only check files modified in this PR to avoid pre-existing issues in
          # untouched files (which may have been formatted with an older gofmt).
          # On push-to-main (no PR), fall back to full repo check.
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}"...HEAD -- '*.go' 2>/dev/null | grep '\.go$' || true)
          else
            CHANGED=$(gofmt -l .)
          fi
          if [ -z "$CHANGED" ]; then
            echo "No Go files to format-check"
            exit 0
          fi
          UNFORMATTED=$(echo "$CHANGED" | xargs gofmt -l 2>/dev/null || true)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files modified in this PR are not gofmt formatted:"
            echo "$UNFORMATTED"
            echo ""
            echo "Fix by running: gofmt -w \$(git diff --name-only origin/main...HEAD -- '*.go')"
            exit 1
          fi
          echo "All changed Go files are properly formatted"
