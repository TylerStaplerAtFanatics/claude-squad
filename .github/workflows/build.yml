name: Build

on:
  push:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'install.sh'
      - 'proto/**'
      - 'web-app/src/**'
      - 'web-app/package.json'
      - 'web-app/package-lock.json'
      - '.github/workflows/build.yml'
      - '.github/actions/prepare/**'
      - '.gitmodules'
      - 'third_party/tmux/**'
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'install.sh'
      - 'proto/**'
      - 'web-app/src/**'
      - 'web-app/package.json'
      - 'web-app/package-lock.json'
      - '.github/workflows/build.yml'
      - '.github/actions/prepare/**'
      - '.gitmodules'
      - 'third_party/tmux/**'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # prepare: generate proto code and build web UI once, share as artifacts.
  # Both test and build matrix download these instead of re-running the pipeline.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Generate & Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate protos and build web UI
        uses: ./.github/actions/prepare

      - name: Upload generated files
        uses: actions/upload-artifact@v4
        with:
          name: generated-files
          path: |
            gen/
            server/web/dist/
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # test: runs on linux/amd64 only. Does NOT gate the build matrix — binaries
  # are published regardless of test failures so the build artifact is always
  # available for manual verification. Lint runs in its own workflow (lint.yml).
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files

      - name: Install tmux build dependencies
        run: sudo apt-get install -y automake libevent-dev libncurses-dev pkg-config

      - name: Cache pinned tmux binary
        uses: actions/cache@v4
        id: tmux-cache
        with:
          path: bin/tmux
          key: tmux-3.4-${{ runner.os }}-v1

      - name: Build pinned tmux 3.4
        if: steps.tmux-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-tmux.sh

      - name: Run tests with coverage (pinned tmux 3.4)
        run: |
          TMUX_BIN="$(pwd)/bin/tmux" go test -race -coverprofile=coverage.out \
            -covermode=atomic ./server/... ./session/... ./config/... \
            || (TMUX_BIN="$(pwd)/bin/tmux" go test -race -v ./...; exit 1)

      - name: Coverage gate
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: coverage.out
          global-threshold: 60
          local-threshold: 0
          badge-file-name: coverage.svg

      - name: Set up Node.js (for coverage report)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate feature E2E coverage report
        id: coverage
        run: |
          cd tools/coverage && npm install --silent
          OUTPUT=$(npx ts-node feature-coverage.ts ../../docs/registry/backend-features.json '../../tests/e2e/**/*.spec.ts' 2>&1)
          echo "$OUTPUT"
          SUMMARY=$(echo "$OUTPUT" | grep 'Feature E2E coverage:' | head -1 || echo "Feature E2E coverage: N/A")
          echo "summary=${SUMMARY}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post feature coverage PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COVERAGE_SUMMARY: ${{ steps.coverage.outputs.summary }}
        with:
          script: |
            const marker = '<!-- feature-coverage -->';
            const summary = process.env.COVERAGE_SUMMARY || 'Feature coverage report unavailable';
            const body = `${marker}\n## 📊 Feature E2E Coverage\n\n${summary}\n\n> Run \`make e2e-report\` locally to view the full Allure report.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
        continue-on-error: true

      - name: Check new RPCs have tests
        run: |
          make registry-generate
          git diff --exit-code docs/registry/features/ || {
            echo "Registry out of date — run: make registry-generate"
            exit 1
          }
          NEW_FILES=$(git diff --name-only origin/main -- 'docs/registry/features/backend/**' 2>/dev/null || true)
          for f in $NEW_FILES; do
            if [ -f "$f" ] && jq -e '.tested == false' "$f" > /dev/null 2>&1; then
              echo "ERROR: New RPC $f has no test (tested: false). Add a test and set tested: true."
              exit 1
            fi
          done
        continue-on-error: true

      - name: Benchmark comparison (advisory, PR only)
        if: github.event_name == 'pull_request'
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          TMUX_BIN="$(pwd)/bin/tmux" go test -bench=BenchmarkNavigation -benchmem -count=5 ./... \
            -timeout=15m > bench-current.txt || true
          if [ -f bench-baseline.txt ]; then
            benchstat bench-baseline.txt bench-current.txt || true
          fi
        continue-on-error: true

      - name: Integration coverage (advisory)
        run: |
          mkdir -p /tmp/covdata
          go build -cover -o stapler-squad-cov .
          GOCOVERDIR=/tmp/covdata STAPLER_SQUAD_INSTANCE=cov-$$ \
            TMUX_BIN="$(pwd)/bin/tmux" ./stapler-squad-cov &
          sleep 2
          TMUX_BIN="$(pwd)/bin/tmux" go test -race -tags integration ./... || true
          pkill -f stapler-squad-cov || true
          sleep 1
          go tool covdata textfmt -i=/tmp/covdata -o integration.out || true
        continue-on-error: true

      - name: Upload integration coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage
          path: integration.out
          if-no-files-found: ignore
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # build: cross-compiles for all supported platforms in parallel.
  # Needs only prepare (not test) so binary artifacts are always uploaded.
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          CGO_CFLAGS: "-Wno-discarded-qualifiers"
        run: |
          BINARY_NAME=stapler-squad
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=$BINARY_NAME.exe
          fi
          VERSION=$(git describe --tags --always --dirty 2>/dev/null | sed 's/^v//' || git rev-parse --short HEAD)
          go build -v -ldflags "-X main.version=${VERSION}" -o build/${{ matrix.goos }}_${{ matrix.goarch }}/$BINARY_NAME .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stapler-squad-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/${{ matrix.goos }}_${{ matrix.goarch }}/*
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # install-check: builds the native linux binary and verifies it runs.
  # This mirrors the path taken by `install.sh --from-source` and `make build`.
  # ─────────────────────────────────────────────────────────────────────────────
  install-check:
    name: Install Check
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files

      - name: Build binary (native)
        run: go build -o stapler-squad .

      - name: Verify binary runs
        run: ./stapler-squad version

  # ─────────────────────────────────────────────────────────────────────────────
  # benchmark-gate: runs on main-merge only. Fails if any benchmark regresses
  # more than 20%. PRs get advisory comments only (never blocked).
  # 20% threshold is deliberate — tmux-touching benchmarks have 15-25% natural
  # variance on shared runners. Use count=10 + utest for statistical significance.
  # ─────────────────────────────────────────────────────────────────────────────
  benchmark-gate:
    name: Benchmark Gate (main only)
    runs-on: ubuntu-latest
    needs: [prepare, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
          cache: true

      - name: Download generated files
        uses: actions/download-artifact@v4
        with:
          name: generated-files

      - name: Install tmux build dependencies
        run: sudo apt-get install -y automake libevent-dev libncurses-dev pkg-config

      - name: Cache pinned tmux binary
        uses: actions/cache@v4
        id: tmux-cache
        with:
          path: bin/tmux
          key: tmux-3.4-${{ runner.os }}-v1

      - name: Build pinned tmux 3.4
        if: steps.tmux-cache.outputs.cache-hit != 'true'
        run: ./scripts/build-tmux.sh

      - name: Run benchmarks (count=10 for significance)
        run: |
          TMUX_BIN="$(pwd)/bin/tmux" go test -bench=. -benchmem -count=10 \
            ./... -timeout=30m > bench-current.txt

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Compare against baseline (20% threshold)
        run: |
          if [ ! -f bench-baseline.txt ]; then
            echo "No baseline found — treating this run as the new baseline (no regression check)"
            cp bench-current.txt bench-baseline.txt
            exit 0
          fi
          benchstat -delta-test=utest bench-baseline.txt bench-current.txt \
            | tee bench-diff.txt
          if grep -E '\+[2-9][0-9]\.' bench-diff.txt | grep -v '±'; then
            echo "Benchmark regression > 20% detected — see bench-diff.txt above"
            exit 1
          fi

      - name: Update baseline on success
        run: |
          cp bench-current.txt bench-baseline.txt
          git config user.email "ci@stapler-squad"
          git config user.name "CI"
          git add bench-baseline.txt
          git commit -m "chore(bench): update baseline [skip ci]" || true
          git push origin HEAD:main
